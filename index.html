<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Système Infecté</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        
        /* Centrage de tous les messages */
        .scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; text-align: center; }

        /* ÉCRAN DE DÉPART (Indispensable) */
        #start-screen { display: flex; flex-direction: column; background: darkred; cursor: pointer; z-index: 100; }
        #start-screen h1 { font-size: 50px; }

        /* PHASE 1 : VIRUS (Texte vert géant) */
        #scene-virus { background: black; color: #0f0; flex-direction: column; }
        #scene-virus h2 { font-size: 80px; text-shadow: 0 0 20px #0f0; }

        /* PHASE 2 : BSOD (L'écran bleu Windows) */
        #scene-bsod { background-color: #0078d7; color: white; flex-direction: column; align-items: flex-start; text-align: left; padding: 10%; }
        .sad-face { font-size: 120px; }
        .bsod-text { font-size: 30px; margin-top: 20px; line-height: 1.4; }

        /* PHASE 3 : ÉCRAN NOIR */
        #scene-black { background: black; }
    </style>
</head>
<body>

    <div id="start-screen" class="scene">
        <h1>⚠️ ERREUR FATALE DÉTECTÉE</h1>
        <p>Cliquez ici pour tenter une réparation du disque (C:)</p>
    </div>

    <div id="scene-virus" class="scene">
        <h2 id="virus-status">EXTRACTION DES DONNÉES...</h2>
    <div style="font-size: 50px; color: #ff0000; margin: 20px 0;" id="main-percent">0%</div>
        
    <div id="pass-console" style="font-family: monospace; font-size: 18px; color: #0f0; height: 200px; overflow: hidden; width: 80%; border: 1px solid #333; padding: 10px; background: rgba(0,20,0,0.5);">
    </div>
        
        <p style="margin-top: 20px; color: #555;">Target: LocalHost/Users/Admin/Documents</p>
    </div>

    <div id="scene-bsod" class="scene">
        <div class="sad-face">:(</div>
        <div class="bsod-text">
            Your PC ran into a problem and needs to restart. We're just collecting some error info, and then we'll restart for you.<br><br>
            <span id="progress">0% complete</span>
        </div>
    </div>

    <div id="scene-black" class="scene"></div>

    <script>
    const TEMPS_VIRUS = 10000; // 10 secondes pour tout voler
    const TEMPS_BSOD  = 8000; 

    const start = document.getElementById('start-screen');
    const s1 = document.getElementById('scene-virus');
    const s2 = document.getElementById('scene-bsod');
    const s3 = document.getElementById('scene-black');
    const mainPercent = document.getElementById('main-percent');
    const passConsole = document.getElementById('pass-console');

    start.addEventListener('click', () => {
        start.style.display = 'none';
        s1.style.display = 'flex';
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();

        // --- LOGIQUE DE L'EXTRACTION ---
        let p = 0;
        let pInterval = setInterval(() => {
            p++;
            mainPercent.innerText = p + "%";
            
            // Ajouter un faux mot de passe à chaque %
            const fakePass = "CRACKED: hash_" + Math.random().toString(36).substring(2, 15) + " -> [OK]";
            const line = document.createElement('div');
            line.innerText = fakePass;
            passConsole.prepend(line); // Ajoute en haut de la liste

            if (p >= 100) {
                clearInterval(pInterval);
                mainPercent.innerText = "100% - TOUT EXTRAIT";
                mainPercent.style.color = "#0f0";
            }
        }, TEMPS_VIRUS / 100); // Répartit sur la durée totale

        // Passage au BSOD après le délai
        setTimeout(() => {
            s1.style.display = 'none';
            s2.style.display = 'flex';
            // (Ici tu gardes ta logique de BSOD précédente...)
        }, TEMPS_VIRUS);
    });
</script>
