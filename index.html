<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chargement en cours...</title>
    <style>
        /* Supprime les marges et empêche le scroll */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            cursor: default;
        }

        /* La vidéo prend tout l'espace disponible sans déformation */
        video {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            pointer-events: none; /* Empêche l'utilisateur de cliquer sur pause */
        }

        /* Message invisible au centre pour forcer l'interaction si besoin */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <video id="prankVideo" loop playsinline>
        <source src="votre-video.mp4" type="video/mp4">
        Ton navigateur ne supporte pas la vidéo.
    </video>

    <script>
        const video = document.getElementById('prankVideo');
        const overlay = document.getElementById('overlay');

        // 1. Démarrage de la vidéo et Plein Écran au premier clic
        overlay.addEventListener('click', () => {
            video.play();
            overlay.style.display = 'none'; // On cache l'overlay une fois cliqué
            
            // Tentative de plein écran
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }
        });

        // 2. Blocage du menu contextuel (clic droit)
        document.addEventListener('contextmenu', e => e.preventDefault());

        // 3. Empêcher la mise en pause (si l'utilisateur trouve une astuce)
        video.onpause = () => video.play();

        // 4. Titre de l'onglet dynamique (Psychologique)
        let titles = ["⚠️ ERREUR SYSTÈME", "Chargement 99%...", "Ne pas fermer !"];
        let i = 0;
        setInterval(() => {
            document.title = titles[i % titles.length];
            i++;
        }, 1000);

        // 5. Alerte avant de quitter l'onglet
        window.onbeforeunload = function() {
            return "Voulez-vous vraiment quitter cette expérience ?";
        };
    </script>
</body>
</html>
